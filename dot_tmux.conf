# ============================================================
# Prefix: backtick (single-key, no Ctrl)
# ============================================================
unbind C-a
unbind C-b
set -g prefix `
bind ` send-prefix

# ============================================================
# Vim-style settings
# ============================================================

# Use vi keys in copy mode (h/j/k/l, w, b, etc.)
setw -g mode-keys vi

# Start windows/panes at index 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Splits keep the current working directory
bind % split-window -h -c "#{pane_current_path}"
bind \" split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation: prefix + h/j/k/l (repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resize: prefix + C-h/j/k/l (repeatable, 5 units)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Copy mode: vim-style selection and yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# Catppuccin Theme (via TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Catppuccin flavor: mocha (dark), macchiato, frappe, latte (light)
set -g @catppuccin_flavor 'mocha'

# Status bar modules
set -g @catppuccin_status_modules_right "date_time battery"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# Make window numbers visible
set -g @catppuccin_window_status_style "rounded"

# ============================================================
# Reload config
# ============================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ============================================================
# Cheatsheet popup (` ?)
# ============================================================
bind ? display-popup -E "cat <<'CHEAT' | less -R
\x1b[1;36m===== Tmux Cheatsheet (\` prefix) =====\x1b[0m

\x1b[1;33mSessions\x1b[0m
  \` d          Detach
  \` s          Interactive session picker
  \` (          Previous session
  \` )          Next session
  \` \$          Rename session

\x1b[1;33mWindows\x1b[0m
  \` c          Create window (in current dir)
  \` ,          Rename window
  \` p / \` n    Previous / next window
  \` 0-9        Jump to window by number
  \` &          Kill window
  \` w          Window list
  \` .          Move window (prompt for index)
  \` f          Find window by name

\x1b[1;33mPanes (Vim-style navigation)\x1b[0m
  \` %          Split vertically (current dir)
  \` \"          Split horizontally (current dir)
  \` h          Move to left pane
  \` j          Move to pane below
  \` k          Move to pane above
  \` l          Move to right pane
  \` arrow      Move to pane (alt)
  \` C-h        Resize left 5
  \` C-j        Resize down 5
  \` C-k        Resize up 5
  \` C-l        Resize right 5
  \` z          Zoom / unzoom pane
  \` !          Break pane to new window
  \` x          Kill pane
  \` q          Show pane numbers
  \` { / }      Swap pane left / right
  \` space      Cycle layouts

\x1b[1;33mCopy Mode (Vi keys)\x1b[0m
  \` [          Enter copy mode
  h/j/k/l       Move cursor (vim-style)
  v              Start selection
  V              Select line
  y / Enter      Yank selection to clipboard
  \` ]          Paste buffer
  q              Exit copy mode

\x1b[1;33mMisc\x1b[0m
  \` ?          This cheatsheet
  \` :          Command prompt
  \` r          Reload config
  \` t          Clock
  \` \`          Send literal \` to shell
  \` L          Clear screen (send C-l)

\x1b[1;32mPrefix: \`   |   Mode: vi   |   Theme: Catppuccin mocha\x1b[0m
CHEAT"

# ============================================================
# Status bar: show help hint
# ============================================================
set -g status-left "#[fg=cyan,bold] \`?=help #[default]"

# ============================================================
# Initialize TPM (must be last line)
# ============================================================
run '~/.tmux/plugins/tpm/tpm'
