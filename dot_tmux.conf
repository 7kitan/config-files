# ============================================================
# General Settings
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides "*:kD=\E[3~"
set -g mouse on
set -g history-limit 50000
set -g focus-events on

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ============================================================
# Keybindings (C-a prefix to avoid C-b conflicts)
# ============================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Pane navigation (hjkl, repeatable)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Quick split keys (same as WezTerm style: d / D)
bind d split-window -h
bind D split-window -v

# ============================================================
# Catppuccin Theme (via TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Catppuccin flavor: mocha (dark), macchiato, frappe, latte (light)
set -g @catppuccin_flavor 'mocha'

# Status bar modules
set -g @catppuccin_status_modules_right "date_time battery"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# Make window numbers visible
set -g @catppuccin_window_status_style "rounded"

# ============================================================
# Initialize TPM (must be last line)
# ============================================================
run '~/.tmux/plugins/tpm/tpm'
